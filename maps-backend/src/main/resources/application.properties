spring.config.import=optional:file:.env[.properties]
spring.application.name=maps-backend

# Database
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USERNAME}
spring.datasource.password=${APP_DB_PASSWORD}
spring.datasource.driver-class-name=${APP_DB_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${APP_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${APP_JPA_DDL_AUTO:none}
spring.jpa.show-sql=${APP_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=${APP_DB_INIT_MODE:never}
spring.sql.init.continue-on-error=false

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Cloudflare R2
app.r2.s3-api-url=${APP_R2_S3_API_URL:}
app.r2.endpoint=${APP_R2_ENDPOINT:}
app.r2.bucket=${APP_R2_BUCKET:}
app.r2.public-base-url=${APP_R2_PUBLIC_BASE_URL:}
app.r2.access-key-id=${APP_R2_ACCESS_KEY_ID:}
app.r2.secret-access-key=${APP_R2_SECRET_ACCESS_KEY:}
app.r2.upload-enabled=${APP_R2_UPLOAD_ENABLED:true}

# Error handling
server.error.include-message=always

# Mistral AI Chatbot
app.mistral.api-key=${APP_MISTRAL_API_KEY}
app.mistral.api-url=${APP_MISTRAL_API_URL:https://api.mistral.ai/v1/chat/completions}
app.mistral.model=${APP_MISTRAL_MODEL:mistral-large-latest}
app.chat.system-prompt-file=${APP_CHAT_SYSTEM_PROMPT_FILE:system_prompt.txt}
app.chat.conversations-file=${APP_CHAT_CONVERSATIONS_FILE:conversations.json}